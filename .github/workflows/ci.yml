name: repository-gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-gate:
    name: Full gate (.NET ${{ matrix.lane }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: first-feature-band
            dotnet: '10.0.100'
          - lane: current-feature-band
            dotnet: '10.0.x'
            quality: preview

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install supported .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}
          dotnet-quality: ${{ matrix.quality }}

      - name: Run build, complete test inventory, cross-process providers, and repository controls
        shell: powershell
        run: .\build\verify-interchange.ps1
